    <style>
        :root {
            --glass-bg: rgba(10, 10, 15, 0.5);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #030305; color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            overflow-x: hidden; margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .font-en { font-family: 'Poppins', sans-serif; }

        /* پس‌زمینه کیهانی */
        .cosmic-bg {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 0%, #1f0545 0%, #0a0216 40%, #030305 100%);
            background-size: 100% 200%;
        }

        /* نور متحرک */
        .ambient-light {
            position: fixed; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(147,51,234,0.15) 0%, transparent 60%);
            border-radius: 50%; z-index: -1; animation: float 10s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(50px) translateX(30px); }
        }

        /* کلاس شیشه‌ای پایه صفحه اصلی */
        .glass-panel {
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem; transition: all 0.3s ease;
        }

        /* ================= انیمیشن آیکون همبرگری 3 خط ================= */
        .hamburger-btn {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; width: 48px; height: 48px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
            cursor: pointer; transition: all 0.3s ease; z-index: 60;
        }
        
        .hamburger-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

        .hamburger-line {
            width: 20px; height: 2px; background-color: #ffffff;
            border-radius: 2px; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center;
        }

        /* حالت باز شدن منو (تبدیل به X) */
        .hamburger-btn.open .hamburger-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.open .hamburger-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger-btn.open .hamburger-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ================= استایل شیک و مینیمال منوی کناری ================= */
        #sidebar {
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(30px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -20px 0 50px rgba(0,0,0,0.7);
        }

        .chic-link {
            position: relative; padding: 1rem 0;
            display: flex; align-items: center; gap: 1rem;
            color: #a1a1aa; transition: all 0.3s ease;
            overflow: hidden; opacity: 0; /* برای انیمیشن ورود */
        }

        .chic-link:hover { color: #ffffff; padding-right: 0.75rem; }

        .chic-link::before {
            content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 0; background: linear-gradient(to bottom, #a855f7, #3b82f6);
            border-radius: 4px; transition: all 0.3s ease;
        }

        .chic-link:hover::before { height: 70%; }
        
        /* دکمه پریمیوم ثبت پروژه */
        .premium-btn {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(59, 130, 246, 0.2));
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.15);
        }
        .premium-btn:hover {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.4), rgba(59, 130, 246, 0.4));
            box-shadow: 0 4px 30px rgba(147, 51, 234, 0.3);
            transform: translateY(-2px);
        }

        .profile-ring { background: conic-gradient(from 0deg, #9333ea, #3b82f6, #ec4899, #9333ea); animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

    <!-- اسکریپت‌ها -->
    <script>
        lucide.createIcons();

        // ۱. انیمیشن باز شدن صفحه اصلی
        window.onload = () => {
            gsap.to("#music-toggle", { opacity: 1, duration: 1, delay: 0.2 });
            gsap.to("#hamburger-btn", { opacity: 1, duration: 1, delay: 0.3 });
            gsap.to(".animate-section", { y: -20, opacity: 1, duration: 0.8, stagger: 0.15, ease: "power3.out" });
        };

        // ۲. موزیک
        const bgMusic = document.getElementById("bg-music");
        const musicToggleBtn = document.getElementById("music-toggle");
        const musicIcon = document.getElementById("music-icon");
        let isPlaying = false;

        const startMusic = () => {
            if (!isPlaying) {
                bgMusic.volume = 0.3;
                bgMusic.play().then(() => {
                    isPlaying = true;
                    musicIcon.setAttribute("data-lucide", "music");
                    musicIcon.classList.replace("text-gray-400", "text-purple-400");
                    musicIcon.classList.add("animate-pulse");
                    lucide.createIcons();
                }).catch(() => {});
            }
            document.removeEventListener("click", startMusic);
            document.removeEventListener("scroll", startMusic);
            document.removeEventListener("touchstart", startMusic);
        };
        document.addEventListener("click", startMusic);
        document.addEventListener("scroll", startMusic);
        document.addEventListener("touchstart", startMusic);

        musicToggleBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.setAttribute("data-lucide", "volume-x");
                musicIcon.classList.replace("text-purple-400", "text-gray-400");
                musicIcon.classList.remove("animate-pulse");
            } else {
                bgMusic.play();
                musicIcon.setAttribute("data-lucide", "music");
                musicIcon.classList.replace("text-gray-400", "text-purple-400");
                musicIcon.classList.add("animate-pulse");
            }
            isPlaying = !isPlaying;
            lucide.createIcons();
        });

        // ۳. منطق منوی همبرگری و سایدبار (با انیمیشن‌های شیک GSAP)
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const chicLinks = document.querySelectorAll('.chic-link');
        let isMenuOpen = false;

        const toggleMenu = () => {
            if (!isMenuOpen) {
                // باز کردن منو
                hamburgerBtn.classList.add('open');
                overlay.classList.remove('invisible');
                overlay.classList.add('opacity-100');
                
                // آوردن سایدبار
                gsap.to(sidebar, { x: 0, duration: 0.6, ease: "power4.out" });
                
                // انیمیشن آبشاری متن‌های داخل منو
                gsap.fromTo(chicLinks, 
                    { x: 30, opacity: 0 }, 
                    { x: 0, opacity: 1, duration: 0.5, stagger: 0.1, delay: 0.2, ease: "power2.out" }
                );
            } else {
                // بستن منو
                hamburgerBtn.classList.remove('open');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('invisible'), 500);
                
                gsap.to(sidebar, { x: "100%", duration: 0.5, ease: "power3.inOut" });
            }
            isMenuOpen = !isMenuOpen;
        };

        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });

        overlay.addEventListener('click', () => {
            if(isMenuOpen) toggleMenu();
        });
    </script>
