    <style>
        body {
            background-color: #050505; color: #ffffff;
            overflow-x: hidden; font-family: 'Vazirmatn', sans-serif; margin: 0;
        }

        .bg-gradient-animate {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a0033, #0a001a, #050505);
            background-size: 200% 200%; animation: gradientMove 15s ease infinite; z-index: -1;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); }
        .spin-border { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

        </section>
