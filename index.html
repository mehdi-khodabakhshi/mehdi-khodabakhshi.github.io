    <style>
        :root {
            --glass-bg: rgba(15, 15, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: #030305; color: #ffffff;
            font-family: 'Vazirmatn', sans-serif;
            overflow-x: hidden; margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .font-en { font-family: 'Poppins', sans-serif; }

        /* پس‌زمینه کیهانی */
        .cosmic-bg {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 0%, #1f0545 0%, #0a0216 40%, #030305 100%);
            background-size: 100% 200%;
        }

        /* نور پس‌زمینه */
        .ambient-light {
            position: fixed; top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(147,51,234,0.15) 0%, transparent 60%);
            border-radius: 50%; z-index: -1; animation: float 10s ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(50px) translateX(30px); }
        }

        /* کلاس شیشه‌ای پایه */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem; transition: all 0.3s ease;
        }

        /* دکمه‌های شناور بالا */
        .top-btn {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; padding: 0.75rem; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .top-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

        /* انیمیشن دور عکس */
        .profile-ring {
            background: conic-gradient(from 0deg, #9333ea, #3b82f6, #ec4899, #9333ea);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* سایدبار (منوی کشویی از راست) */
        #sidebar {
            box-shadow: -10px 0 40px rgba(0,0,0,0.5);
            border-right: none; border-radius: 2rem 0 0 2rem;
            border-left: 1px solid var(--glass-border);
        }
    </style>
</head>

            <!-- ثبت پروژه (تماس) -->

    <!-- اسکریپت‌ها -->
    <script>
        // ۱. رندر آیکون‌ها
        lucide.createIcons();

        // ۲. انیمیشن باز شدن صفحه
        window.onload = () => {
            gsap.to("#music-toggle", { opacity: 1, duration: 1, delay: 0.2 });
            gsap.to("#hamburger-btn", { opacity: 1, duration: 1, delay: 0.3 });
            gsap.to(".animate-section", { 
                y: -20, 
                opacity: 1, 
                duration: 0.8, 
                stagger: 0.15, 
                ease: "power3.out" 
            });
        };

        // ۳. موزیک اتوماتیک با اولین کلیک/اسکرول
        const bgMusic = document.getElementById("bg-music");
        const musicToggleBtn = document.getElementById("music-toggle");
        const musicIcon = document.getElementById("music-icon");
        let isPlaying = false;

        const startMusic = () => {
            if (!isPlaying) {
                bgMusic.volume = 0.3; // صدای نرم
                bgMusic.play().then(() => {
                    isPlaying = true;
                    musicIcon.setAttribute("data-lucide", "music");
                    musicIcon.classList.replace("text-gray-400", "text-purple-400");
                    musicIcon.classList.add("animate-pulse");
                    lucide.createIcons();
                }).catch(() => {});
            }
            document.removeEventListener("click", startMusic);
            document.removeEventListener("scroll", startMusic);
            document.removeEventListener("touchstart", startMusic);
        };

        document.addEventListener("click", startMusic);
        document.addEventListener("scroll", startMusic);
        document.addEventListener("touchstart", startMusic);

        // دکمه دستی موزیک
        musicToggleBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.setAttribute("data-lucide", "volume-x");
                musicIcon.classList.replace("text-purple-400", "text-gray-400");
                musicIcon.classList.remove("animate-pulse");
            } else {
                bgMusic.play();
                musicIcon.setAttribute("data-lucide", "music");
                musicIcon.classList.replace("text-gray-400", "text-purple-400");
                musicIcon.classList.add("animate-pulse");
            }
            isPlaying = !isPlaying;
            lucide.createIcons();
        });

        // ۴. منطق سایدبار و منوی همبرگری
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        let isMenuOpen = false;

        const toggleMenu = () => {
            if (!isMenuOpen) {
                // باز کردن منو
                overlay.classList.remove('invisible');
                overlay.classList.add('opacity-100');
                gsap.to(sidebar, { x: 0, duration: 0.5, ease: "power3.out" });
                hamburgerIcon.setAttribute("data-lucide", "x");
                hamburgerBtn.classList.add("bg-white/10");
            } else {
                // بستن منو
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('invisible'), 300);
                gsap.to(sidebar, { x: "100%", duration: 0.4, ease: "power3.in" });
                hamburgerIcon.setAttribute("data-lucide", "menu");
                hamburgerBtn.classList.remove("bg-white/10");
            }
            isMenuOpen = !isMenuOpen;
            lucide.createIcons();
        };

        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });

        overlay.addEventListener('click', () => {
            if(isMenuOpen) toggleMenu();
        });
    </script>
